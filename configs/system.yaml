controller:
  rest_api_port: 8080
  poll_interval_sec: 2.0
  ga_interval_sec: 10.0
  flow_idle_timeout: 30
  flow_hard_timeout: 0

vip:
  ip: "10.0.0.100"
  mac: "00:00:00:00:00:64"

backends:
  - name: "web-1"
    ip: "10.0.0.7"
    mac: "00:00:00:00:00:07"
    dpid: 5
    port: 1
    capacity:
      cpu_cores: 2
      mem_gb: 4
      bw_mbps: 1000
  - name: "web-2"
    ip: "10.0.0.8"
    mac: "00:00:00:00:00:08"
    dpid: 5
    port: 2
    capacity:
      cpu_cores: 2
      mem_gb: 4
      bw_mbps: 1000
  - name: "app-1"
    ip: "10.0.0.12"
    mac: "00:00:00:00:00:12"
    dpid: 6
    port: 1
    capacity:
      cpu_cores: 4
      mem_gb: 8
      bw_mbps: 1000
  - name: "db-1"
    ip: "10.0.0.14"
    mac: "00:00:00:00:00:14"
    dpid: 6
    port: 3
    capacity:
      cpu_cores: 4
      mem_gb: 8
      bw_mbps: 1000

clients:
  - name: "client1"
    ip: "10.0.0.1"
    mac: "00:00:00:00:00:01"
    dpid: 4
    port: 1
  - name: "client2"
    ip: "10.0.0.2"
    mac: "00:00:00:00:00:02"
    dpid: 4
    port: 2

monitoring:
  ryu_stats:
    enabled: true
  prometheus:
    enabled: false
    base_url: "http://127.0.0.1:9090"
    timeout_sec: 2
    promql:
      cpu_util: 'avg(rate(node_cpu_seconds_total{mode!="idle",instance="{instance}"}[1m]))'
      mem_util: '(1 - (node_memory_MemAvailable_bytes{instance="{instance}"} / node_memory_MemTotal_bytes{instance="{instance}"}))'
  instances: {}

hybrid:
  overload_threshold:
    cpu: 0.85
    mem: 0.85
    bw: 0.85
    conn: 0.90
  rr:
    mode: "smooth_weighted"
  ga:
    population: 20
    generations: 25
    crossover_rate: 0.7
    mutation_rate: 0.2
    tournament_k: 3
    elitism: 2
    seed: 42
    fitness:
      util_weights:
        cpu: 0.40
        mem: 0.30
        bw: 0.20
        conn: 0.10
      overload_threshold: 0.85
      penalty_overload: 3.0
      penalty_variance: 1.0
      sla_latency_ms: 200
      penalty_sla: 5.0
