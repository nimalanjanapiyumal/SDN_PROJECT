global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: sdn_controller
    static_configs:
      - targets: ["127.0.0.1:9101"]

  - job_name: ml_policy_agent
    static_configs:
      - targets: ["127.0.0.1:9102"]
